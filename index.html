<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang bí mật</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      font-family: Arial;

      background-image:
        url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");

      background-size: cover;

      background-position: center;

    }

    .box {

      width: 400px;

      background: rgba(255,255,255,0.15);

      backdrop-filter: blur(10px);

      padding: 30px;

      border-radius: 20px;

      text-align: center;

      color: white;

      box-shadow: 0 8px 20px rgba(0,0,0,0.3);

    }

    h1 {

      margin-bottom: 20px;

      font-size: 28px;

    }

    input {

      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 10px;

      margin-bottom: 16px;

      font-size: 16px;

    }

    button {

      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 10px;

      background: #2563eb;

      color: white;

      font-size: 16px;

      cursor: pointer;

      transition: 0.3s;

    }

    button:hover {

      opacity: 0.9;

    }

    .error {

      margin-top: 14px;

      color: #ffd5d5;

    }

  </style>
</head>

<body>

  <div class="box">

    <h1>
      Mã bí mật:
    </h1>

    <input
      type="password"
      id="secret"
      placeholder=""
    >

    <button onclick="checkPassword()">
      Tiếp tục
    </button>

    <div class="error" id="error"></div>

  </div>

  <script>

    function checkPassword() {

      const password =
        document.getElementById("secret").value;

      const error =
        document.getElementById("error");

      if (password === "chuotbatmeo") {

        window.location.href =
          "timkiem.html";

      }

      else {

        error.innerText =
          "Mã bí mật không đúng 😢";

      }

    }

  </script>

</body>

</html>
