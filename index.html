<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mưa Tĩnh Lặng</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Quicksand',sans-serif;

      min-height:100vh;

      overflow-x:hidden;

      background:
      linear-gradient(
        rgba(255,255,255,0.45),
        rgba(255,255,255,0.45)
      ),
      url("https://images.unsplash.com/photo-1515694346937-94d85e41e6f0");

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;

      padding:30px;

    }

    /* ================= TOP BAR ================= */

    .top-bar{

      position:fixed;

      top:20px;
      left:20px;
      right:20px;

      display:flex;

      justify-content:space-between;
      align-items:flex-start;

      z-index:999999;

    }

    /* ================= MENU ================= */

    .menu-container{

      position:relative;

    }

    .menu-btn{

      width:58px;
      height:58px;

      border:none;

      border-radius:18px;

      background:
      rgba(255,255,255,0.95);

      font-size:28px;

      cursor:pointer;

      box-shadow:
      0 8px 24px rgba(0,0,0,0.18);

      transition:0.3s;

    }

    .menu-btn:hover{

      transform:scale(1.06);

    }

    .dropdown{

      position:absolute;

      top:70px;
      left:0;

      width:240px;

      background:
      rgba(255,255,255,0.96);

      border-radius:24px;

      padding:18px;

      display:none;

      flex-direction:column;

      gap:14px;

      box-shadow:
      0 14px 30px rgba(0,0,0,0.18);

      backdrop-filter:blur(10px);

    }

    .dropdown a{

      text-decoration:none;

      color:#444;

      font-size:18px;
      font-weight:bold;

      padding:14px 16px;

      border-radius:14px;

      transition:0.3s;

      background:
      rgba(230,240,255,0.7);

    }

    .dropdown a:hover{

      background:
      linear-gradient(
        135deg,
        #89f7fe,
        #66a6ff
      );

      color:white;

      transform:translateX(4px);

    }

    .dropdown.show{

      display:flex;

    }

    /* ================= CLOCK ================= */

    .clock-text{

      font-size:17px;

      color:#222;

      font-weight:bold;

      text-shadow:
      0 0 8px rgba(255,255,255,0.9);

      line-height:1.8;

      text-align:right;

    }

    /* ================= HERO ================= */

    .hero{

      text-align:center;

      margin-top:120px;
      margin-bottom:45px;

    }

    .hero h1{

      font-size:72px;

      color:#3a86ff;

      text-shadow:
      0 0 14px rgba(255,255,255,0.95),
      0 0 28px rgba(173,216,230,0.9);

      animation:floatTitle 3s ease-in-out infinite;

    }

    .hero p{

      margin-top:18px;

      font-size:22px;

      color:#333;

    }

    @keyframes floatTitle{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-6px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    /* ================= SLIDER ================= */

    .slider{

      width:100%;

      overflow:hidden;

      margin-top:45px;
      margin-bottom:65px;

      position:relative;

    }

    .slide-track{

      display:flex;

      width:max-content;

      animation:scrollSlide 90s linear infinite;

      gap:22px;

    }

    .slide{

      width:340px;
      height:220px;

      border-radius:28px;

      overflow:hidden;

      flex-shrink:0;

      box-shadow:
      0 14px 30px rgba(0,0,0,0.2);

    }

    .slide img{

      width:100%;
      height:100%;

      object-fit:cover;

      transition:0.5s;

    }

    .slide:hover img{

      transform:scale(1.08);

    }

    @keyframes scrollSlide{

      0%{
        transform:translateX(0);
      }

      100%{
        transform:translateX(-50%);
      }

    }

    /* ================= QUOTE ================= */

    .quote{

      max-width:1100px;

      margin:auto;

      margin-bottom:60px;

      background:
      rgba(255,255,255,0.88);

      border-radius:28px;

      padding:34px;

      text-align:center;

      font-size:30px;

      color:#3a86ff;

      font-weight:bold;

      line-height:1.8;

      box-shadow:
      0 12px 30px rgba(0,0,0,0.12);

    }

    /* ================= FOOTER ================= */

    footer{

      text-align:center;

      color:#333;

      font-size:18px;

      padding-bottom:25px;

    }

  </style>

</head>

<body>

  <!-- TOP BAR -->

  <div class="top-bar">

    <!-- MENU -->

    <div class="menu-container">

      <button class="menu-btn"
              id="menuBtn">

        ☰

      </button>

      <div class="dropdown"
           id="dropdownMenu">

        <a href="index.html">
          🏠 Trang Chủ
        </a>

        <a href="kinhphapcu.html">
          📖 Kinh Pháp Cú
        </a>

        <a href="timkiem.html">
          🔍 Tìm Kiếm
        </a>

      </div>

    </div>

    <!-- CLOCK -->

    <div class="clock-text"
         id="clockText">

    </div>

  </div>

  <!-- HERO -->

  <section class="hero">

    <h1>☔ Mưa Tĩnh Lặng ☔</h1>

    <p>
      Một khoảng trời bình yên giữa những cơn mưa nhẹ
    </p>

  </section>

  <!-- SLIDER -->

  <section class="slider">

    <div class="slide-track"
         id="slideTrack">

    </div>

  </section>

  <!-- QUOTE -->

  <section class="quote">

    “Ngồi nghe mưa rơi, lòng cũng dịu lại.”

  </section>

  <!-- FOOTER -->

  <footer>

    Chúc bạn luôn bình yên giữa những ngày mưa ☔

  </footer>

  <!-- AUDIO -->

  <audio id="bgMusic"
         autoplay
         loop>

    <source src="audio/nhacnen/00.mp3"
            type="audio/mpeg">

  </audio>

  <script>

    /* ================= CLOCK ================= */

    function updateClock(){

      const now = new Date();

      const weekdays = [
        "Chủ Nhật",
        "Thứ Hai",
        "Thứ Ba",
        "Thứ Tư",
        "Thứ Năm",
        "Thứ Sáu",
        "Thứ Bảy"
      ];

      const weekday =
      weekdays[now.getDay()];

      const time =
      now.toLocaleTimeString("vi-VN");

      const date =
      now.toLocaleDateString("vi-VN");

      document.getElementById("clockText")
      .innerHTML =

      `${weekday}, ${date} • ${time}`;

    }

    setInterval(updateClock,1000);

    updateClock();

    /* ================= MENU ================= */

    const menuBtn =
    document.getElementById("menuBtn");

    const dropdownMenu =
    document.getElementById("dropdownMenu");

    menuBtn.addEventListener("click", () => {

      dropdownMenu.classList.toggle("show");

    });

    window.addEventListener("click", e => {

      if(
        !menuBtn.contains(e.target)
        &&
        !dropdownMenu.contains(e.target)
      ){

        dropdownMenu.classList.remove("show");

      }

    });

    /* ================= MUSIC ================= */

    const bgMusic =
    document.getElementById("bgMusic");

    bgMusic.volume = 0.22;

    window.addEventListener("click", () => {

      bgMusic.play();

    },{ once:true });

    /* ================= LOAD IMAGES ================= */

    fetch("json/imageshome.json")

    .then(response => response.json())

    .then(images => {

      const slideTrack =
      document.getElementById("slideTrack");

      const duplicated =
      [...images, ...images];

      duplicated.forEach(src => {

        const slide =
        document.createElement("div");

        slide.className = "slide";

        slide.innerHTML =

        `<img src="${src}">`;

        slideTrack.appendChild(slide);

      });

    });

  </script>

</body>

</html>
