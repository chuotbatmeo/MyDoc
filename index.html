<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mưa Tĩnh Lặng</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>

  <div id="loading">
    ☔ Mưa Tĩnh Lặng
    <div style="font-size:17px;margin-top:12px;">
      Đang chuẩn bị khoảng trời bình yên...
    </div>
  </div>

  <div class="top-bar">

    <div class="menu-container">
      <button class="menu-btn" id="menuBtn">☰</button>

      <div class="dropdown" id="dropdownMenu">
        <a href="index.html">🏠 Trang Chủ</a>
        <a href="kinhphapcu.html">📖 Kinh Pháp Cú</a>
        <a href="timkiem.html">🔍 Tìm Kiếm</a>
      </div>
    </div>

    <div class="clock-text" id="clockText"></div>

  </div>

  <section class="hero">
    <h1>☔ Mưa Tĩnh Lặng ☔</h1>
    <p>Một khoảng trời bình yên giữa những cơn mưa nhẹ</p>
  </section>

  <div class="greeting" id="greeting"></div>

  <section class="slider">
    <div class="slide-track" id="slideTrack"></div>
  </section>

  <section class="quote" id="quoteBox"></section>

  <footer>
    Chúc bạn luôn bình yên giữa những ngày mưa ☔
  </footer>

  <audio id="bgMusic" autoplay loop>
    <source src="audio/lists/muathuychi.mp3" type="audio/mpeg">
  </audio>

  <script>

    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("loading").classList.add("hide");
      }, 900);
    });

    function updateClock(){
      const now = new Date();

      const weekdays = [
        "Chủ Nhật",
        "Thứ Hai",
        "Thứ Ba",
        "Thứ Tư",
        "Thứ Năm",
        "Thứ Sáu",
        "Thứ Bảy"
      ];

      const weekday = weekdays[now.getDay()];
      const time = now.toLocaleTimeString("vi-VN");
      const date = now.toLocaleDateString("vi-VN");

      document.getElementById("clockText").innerHTML =
      `${weekday}, ${date} • ${time}`;
    }

    setInterval(updateClock,1000);
    updateClock();

    const menuBtn = document.getElementById("menuBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");

    menuBtn.addEventListener("click", () => {
      dropdownMenu.classList.toggle("show");
    });

    window.addEventListener("click", e => {
      if(!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)){
        dropdownMenu.classList.remove("show");
      }
    });

    const hour = new Date().getHours();
    const greeting = document.getElementById("greeting");

    if(hour < 11){
      greeting.innerHTML = "☀️ Chào buổi sáng nhẹ nhàng";
    }
    else if(hour < 18){
      greeting.innerHTML = "🌤️ Chúc bạn một ngày an yên";
    }
    else{
      greeting.innerHTML = "🌙 Chúc bạn một buổi tối bình yên";
    }

    const quotes = [
      "Ngồi nghe mưa rơi, lòng cũng dịu lại",
      "Tĩnh lặng là nơi bình an bắt đầu",
      "Buông xuống cũng là một loại tự do",
      "Mưa rơi ngoài hiên, tâm thôi vội vã",
      "Bình yên không ở đâu xa, chỉ ở trong lòng"
    ];

    document.getElementById("quoteBox").innerText =
    quotes[Math.floor(Math.random() * quotes.length)];

    fetch("json/imageshome.json")
    .then(response => response.json())
    .then(images => {
      const slideTrack = document.getElementById("slideTrack");
      const duplicated = [...images, ...images];

      duplicated.forEach(src => {
        const slide = document.createElement("div");
        slide.className = "slide";
        slide.innerHTML = `<img src="${src}">`;
        slideTrack.appendChild(slide);
      });
    });

    const bgMusic = document.getElementById("bgMusic");
    bgMusic.volume = 0.22;

    window.addEventListener("click", () => {
      bgMusic.play();
    },{ once:true });

    for(let i = 0; i < 80; i++){
      const r = document.createElement("div");
      r.className = "rain";
      r.style.left = Math.random() * 100 + "vw";
      r.style.animationDuration = (0.7 + Math.random() * 1.2) + "s";
      r.style.opacity = Math.random();
      document.body.appendChild(r);
    }

    for(let i = 0; i < 14; i++){
      const f = document.createElement("div");
      f.className = "firefly";
      f.style.left = Math.random() * 100 + "vw";
      f.style.top = Math.random() * 100 + "vh";
      f.style.animationDelay = Math.random() * 8 + "s";
      document.body.appendChild(f);
    }

    document.addEventListener("mousemove", e => {
      if(Math.random() > 0.94){
        const p = document.createElement("div");
        p.innerText = "🪷";
        p.style.position = "fixed";
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        p.style.pointerEvents = "none";
        p.style.zIndex = "999999";
        p.style.animation = "petalMove 1.2s forwards";

        document.body.appendChild(p);

        setTimeout(() => {
          p.remove();
        }, 1200);
      }
    });

    const style = document.createElement("style");

    style.innerHTML = `
      @keyframes petalMove{
        to{
          transform:translateY(-60px) rotate(80deg);
          opacity:0;
        }
      }
    `;

    document.head.appendChild(style);

    document.addEventListener("click", e => {
      const ripple = document.createElement("div");
      ripple.className = "ripple";
      ripple.style.left = e.clientX + "px";
      ripple.style.top = e.clientY + "px";

      document.body.appendChild(ripple);

      setTimeout(() => {
        ripple.remove();
      },800);
    });

  </script>

</body>
</html>
