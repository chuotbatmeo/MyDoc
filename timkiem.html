<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Kho dữ liệu</title>

  <!-- FONT -->

  <link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <!-- ICON -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

    }

    body {

      min-height: 100vh;

      font-family: 'Quicksand', sans-serif;

      color: #222;

      overflow-x: hidden;

      padding: 40px;

      background:

        linear-gradient(

          rgba(255,255,255,0.72),

          rgba(255,255,255,0.72)

        ),

        url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");

      background-size: cover;

      background-position: center;

      background-repeat: no-repeat;

      background-attachment: fixed;

    }

    .container {

      max-width: 900px;

      margin: auto;

    }

    /* ========================= */
    /* STICKERS */
    /* ========================= */

    .stickers {

      display: flex;

      justify-content: center;

      gap: 30px;

      margin-bottom: 20px;

    }

    .sticker {

      font-size: 70px;

      animation: floaty 2.5s ease-in-out infinite;

      user-select: none;

    }

    .sticker.cat {

      animation-delay: 1s;

    }

    @keyframes floaty {

      0% {

        transform: translateY(0px) rotate(0deg);

      }

      50% {

        transform: translateY(-10px) rotate(4deg);

      }

      100% {

        transform: translateY(0px) rotate(0deg);

      }

    }

    /* ========================= */
    /* TITLE */
    /* ========================= */

    h1 {

      text-align: center;

      margin-bottom: 28px;

      font-size: 34px;

      color: #1e293b;

      text-shadow:
        0 2px 10px rgba(255,255,255,0.7);

    }

    /* ========================= */
    /* SEARCH */
    /* ========================= */

    input {

      width: 100%;

      padding: 16px;

      border-radius: 18px;

      border: 1px solid #d1d5db;

      font-size: 16px;

      margin-bottom: 32px;

      outline: none;

      background: rgba(255,255,255,0.96);

      font-family: inherit;

      backdrop-filter: blur(8px);

      box-shadow:
        0 8px 25px rgba(0,0,0,0.08);

    }

    input:focus {

      border-color: #2563eb;

      box-shadow:
        0 0 0 5px rgba(37,99,235,0.12);

    }

    /* ========================= */
    /* CARD */
    /* ========================= */

    .card {

      position: relative;

      background: rgba(255,255,255,0.94);

      backdrop-filter: blur(12px);

      border-radius: 26px;

      padding: 34px;

      margin-bottom: 30px;

      border: 1px solid rgba(255,255,255,0.9);

      box-shadow:
        0 15px 40px rgba(0,0,0,0.08),
        0 0 0 1px rgba(255,255,255,0.4);

    }

    .card div {

      margin-bottom: 16px;

      line-height: 1.95;

      color: #2d3748;

      font-size: 19px;

      word-break: break-word;

    }

    /* ========================= */
    /* TITLE LINE */
    /* ========================= */

    .title-line {

      font-size: 34px !important;

      font-weight: 700;

      color: #2563eb !important;

      margin-bottom: 28px !important;

      line-height: 1.4 !important;

      padding-right: 70px;

    }

    /* ========================= */
    /* COPY BUTTON */
    /* ========================= */

    .copy-icon {

      position: absolute;

      top: 24px;

      right: 24px;

      width: 44px;

      height: 44px;

      border-radius: 14px;

      background: #2563eb;

      color: white;

      display: flex;

      align-items: center;

      justify-content: center;

      cursor: pointer;

      transition: 0.2s;

      font-size: 16px;

      box-shadow:
        0 6px 16px rgba(37,99,235,0.3);

    }

    .copy-icon:hover {

      transform: scale(1.08);

    }

    /* ========================= */
    /* TOAST */
    /* ========================= */

    .toast {

      position: fixed;

      bottom: 90px;

      left: 50%;

      transform: translateX(-50%);

      background: rgba(37,99,235,0.96);

      color: white;

      padding: 12px 22px;

      border-radius: 14px;

      font-size: 14px;

      opacity: 0;

      pointer-events: none;

      transition: 0.3s;

      z-index: 99999;

      box-shadow:
        0 8px 20px rgba(0,0,0,0.15);

    }

    .toast.show {

      opacity: 1;

      bottom: 105px;

    }

    /* ========================= */
    /* EMPTY */
    /* ========================= */

    .empty {

      text-align: center;

      padding: 50px;

      font-size: 22px;

      color: #555;

    }

    /* ========================= */
    /* POPUP LINK */
    /* ========================= */

    .popup-link {

      color: #2563eb;

      font-weight: bold;

      cursor: pointer;

      text-decoration: underline;

    }

    /* ========================= */
    /* POPUP */
    /* ========================= */

    .popup-overlay {

      position: fixed;

      inset: 0;

      background: rgba(0,0,0,0.45);

      display: none;

      align-items: center;

      justify-content: center;

      z-index: 999999;

      padding: 20px;

      backdrop-filter: blur(4px);

    }

    .popup-box {

      background: rgba(255,255,255,0.98);

      width: 100%;

      max-width: 760px;

      border-radius: 28px;

      padding: 34px;

      max-height: 82vh;

      overflow-y: auto;

      position: relative;

      box-shadow:
        0 25px 60px rgba(0,0,0,0.2);

    }

    .popup-content {

      line-height: 2;

      font-size: 19px;

      color: #333;

      white-space: pre-line;

    }

    .popup-close {

      position: absolute;

      top: 18px;

      right: 20px;

      font-size: 24px;

      cursor: pointer;

      color: #555;

    }

    /* ========================= */
    /* COPY POPUP */
    /* ========================= */

    .popup-copy {

      position: absolute;

      top: 18px;

      right: 58px;

      width: 42px;

      height: 42px;

      border-radius: 12px;

      background: #2563eb;

      color: white;

      display: flex;

      align-items: center;

      justify-content: center;

      cursor: pointer;

      transition: 0.2s;

      font-size: 15px;

      box-shadow:
        0 6px 16px rgba(37,99,235,0.25);

    }

    .popup-copy:hover {

      transform: scale(1.08);

    }

    /* ========================= */
    /* MUSIC BUTTON */
    /* ========================= */

    #musicButton {

      position: fixed;

      right: 18px;

      bottom: 18px;

      width: 60px;

      height: 60px;

      border-radius: 50%;

      background: rgba(37,99,235,0.95);

      color: white;

      display: flex;

      align-items: center;

      justify-content: center;

      font-size: 22px;

      cursor: pointer;

      z-index: 99999;

      box-shadow:
        0 10px 25px rgba(0,0,0,0.18);

      transition: 0.25s;

      backdrop-filter: blur(10px);

    }

    #musicButton:hover {

      transform: scale(1.08);

    }

    #musicButton.playing {

      animation: spinMusic 4s linear infinite;

    }

    @keyframes spinMusic {

      from {

        transform: rotate(0deg);

      }

      to {

        transform: rotate(360deg);

      }

    }

    /* ========================= */
    /* MOBILE */
    /* ========================= */

    @media (max-width: 768px) {

      body {

        padding: 20px;

      }

      .title-line {

        font-size: 28px !important;

      }

      .card {

        padding: 24px;

      }

      .card div {

        font-size: 17px;

      }

      .popup-content {

        font-size: 17px;

      }

      .sticker {

        font-size: 56px;

      }

    }

  </style>

</head>

<body>

  <div class="container">

    <div class="stickers">

      <div class="sticker">
        🐭
      </div>

      <div class="sticker cat">
        🐱
      </div>

    </div>

    <h1>Kho dữ liệu 🔍</h1>

    <input
      type="text"
      id="search"
      placeholder="Nhập từ khóa để tìm kiếm..."
    >

    <div id="result"></div>

  </div>

  <!-- TOAST -->

  <div id="toast" class="toast">

    Đã copy nội dung

  </div>

  <!-- POPUP -->

  <div
    class="popup-overlay"
    id="popupOverlay">

    <div class="popup-box">

      <div
        class="popup-close"
        onclick="closePopup()">

        ✕

      </div>

      <div class="popup-copy"
           onclick="copyPopupContent()">

        <i class="fa-regular fa-copy"></i>

      </div>

      <div
        class="popup-content"
        id="popupContent">

      </div>

    </div>

  </div>

  <!-- NHẠC -->

  <audio id="bgMusic" loop>

    <source
      src="nhacthien.mp3"
      type="audio/mpeg">

  </audio>

  <!-- NÚT NHẠC -->

  <div id="musicButton">

    <i class="fa-solid fa-music"></i>

  </div>

  <script>

    let data = [];

    const search =
      document.getElementById("search");

    const result =
      document.getElementById("result");

    const toast =
      document.getElementById("toast");

    fetch("data.json")

      .then(response => response.json())

      .then(json => {

        data = json;

        showList(data);

      });

    // =========================
    // HIỂN THỊ
    // =========================

    function showList(list) {

      result.innerHTML = "";

      if (list.length === 0) {

        result.innerHTML = `

          <div class="empty">

            Không tìm thấy dữ liệu 😢

          </div>

        `;

        return;

      }

      list.forEach(item => {

        let html = `
          <div class="card">
        `;

        let first = true;

        let copyLines = [];

        for (const key in item) {

          const value =
            String(item[key]);

          if (!first) {

            copyLines.push(value);

          }

          html += `

            <div class="${
              first ? "title-line" : ""
            }">

              ${formatText(value)}

            </div>

          `;

          first = false;

        }

        const copyText =
          copyLines.join("\n");

        html += `

          <div
            class="copy-icon"
            onclick="copyContent(\`${copyText}\`)">

            <i class="fa-regular fa-copy"></i>

          </div>

        `;

        html += `
          </div>
        `;

        result.innerHTML += html;

      });

    }

    // =========================
    // FORMAT TEXT
    // =========================

    function formatText(text) {

      window.popupData =
        window.popupData || {};

      return text

        // POPUP

        .replace(

          /<popup>(.*?)\|(.*?)<\/popup>/gs,

          function(match, title, content) {

            const popupId =
              "popup_" + Math.random()
                .toString(36)
                .substring(2, 10);

            window.popupData[popupId] =
              content;

            return `<span class="popup-link" onclick="openPopupById('${popupId}')">${title}</span>`;

          }

        )

        // XUỐNG DÒNG

        .replace(/\n/g, "<br>")

        // MÀU CHỮ

        .replace(/<red>(.*?)<\/red>/g,
          '<span style="color:red;">$1</span>')

        .replace(/<blue>(.*?)<\/blue>/g,
          '<span style="color:blue;">$1</span>')

        .replace(/<green>(.*?)<\/green>/g,
          '<span style="color:green;">$1</span>')

        .replace(/<pink>(.*?)<\/pink>/g,
          '<span style="color:hotpink;">$1</span>')

        .replace(/<gray>(.*?)<\/gray>/g,
          '<span style="color:gray;">$1</span>')

        .replace(/<purple>(.*?)<\/purple>/g,
          '<span style="color:purple;">$1</span>')

        .replace(/<orange>(.*?)<\/orange>/g,
          '<span style="color:orange;">$1</span>');

    }

    // =========================
    // SEARCH
    // =========================

    search.addEventListener("input", () => {

      const keyword =
        search.value.toLowerCase();

      const filtered = data.filter(item => {

        return Object.values(item)

          .join(" ")

          .toLowerCase()

          .includes(keyword);

      });

      showList(filtered);

    });

    // =========================
    // COPY CARD
    // =========================

    function copyContent(text) {

      navigator.clipboard.writeText(text)

        .then(() => {

          showToast();

        });

    }

    // =========================
    // COPY POPUP
    // =========================

    function copyPopupContent() {

      const text =
        popupContent.innerText.trim();

      navigator.clipboard.writeText(text)

        .then(() => {

          showToast();

        });

    }

    // =========================
    // TOAST
    // =========================

    function showToast() {

      toast.classList.add("show");

      setTimeout(() => {

        toast.classList.remove("show");

      }, 2000);

    }

    // =========================
    // POPUP
    // =========================

    const popupOverlay =
      document.getElementById("popupOverlay");

    const popupContent =
      document.getElementById("popupContent");

    function openPopup(content) {

      popupContent.innerHTML =
        formatText(content);

      popupOverlay.style.display = "flex";

    }

    function openPopupById(id) {

      const content =
        window.popupData[id];

      openPopup(content);

    }

    function closePopup() {

      popupOverlay.style.display = "none";

    }

    popupOverlay.addEventListener("click", e => {

      if (e.target === popupOverlay) {

        closePopup();

      }

    });

    // =========================
    // NHẠC
    // =========================

    const bgMusic =
      document.getElementById("bgMusic");

    const musicButton =
      document.getElementById("musicButton");

    bgMusic.volume = 0.18;

    document.body.addEventListener("click", () => {

      bgMusic.play()

        .then(() => {

          musicButton.classList.add("playing");

        })

        .catch(err => {

          console.log(err);

        });

    }, { once: true });

    musicButton.addEventListener("click", () => {

      if (bgMusic.paused) {

        bgMusic.play();

        musicButton.classList.add("playing");

      }

      else {

        bgMusic.pause();

        musicButton.classList.remove("playing");

      }

    });

  </script>

</body>

</html>
