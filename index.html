<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mưa Tĩnh Lặng</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>

  <div id="loading">
    ☔ Mưa Tĩnh Lặng
    <div style="font-size:17px;margin-top:12px;">
      Đang chuẩn bị khoảng trời bình yên...
    </div>
  </div>

  <div class="top-bar">

    <div class="menu-container">
      <button class="menu-btn" id="menuBtn">☰</button>

      <div class="dropdown" id="dropdownMenu">
        <a href="kinhphapcu.html">📖 Kinh Pháp Cú</a>
      </div>
    </div>

    <div class="clock-text" id="clockText"></div>

  </div>

  <section class="hero">
    <h1>☔ Mưa Tĩnh Lặng ☔</h1>
    <p>Một khoảng trời bình yên giữa những cơn mưa nhẹ</p>
  </section>
  <a
  href="https://zalo.me/0878007900"
  target="_blank"
  class="zalo-float"
  title="Chat Zalo"
>
  <img src="images/zalo.png" alt="Zalo">
</a>
  <div class="greeting" id="greeting"></div>

  <section class="slider">
    <div class="slide-track" id="slideTrack"></div>
  </section>

  <section class="quote" id="quoteBox"></section>

  <footer>
    Chúc bạn luôn bình yên giữa những ngày mưa ☔
  </footer>

  <div class="mini-music-player">
    <button id="miniShuffleBtn" title="Phát ngẫu nhiên">🔀</button>
    <button id="miniPrevBtn" title="Bài trước">⏮</button>
    <button id="miniPlayBtn" class="mini-play" title="Phát / Tạm dừng">▶</button>
    <button id="miniNextBtn" title="Bài tiếp">⏭</button>
    <button id="miniRepeatBtn" title="Lặp lại">🔁</button>
  </div>

  <audio id="bgMusic"></audio>

  <script>

    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("loading").classList.add("hide");
      }, 900);
    });

    function updateClock(){
      const now = new Date();

      const weekdays = [
        "Chủ Nhật",
        "Thứ Hai",
        "Thứ Ba",
        "Thứ Tư",
        "Thứ Năm",
        "Thứ Sáu",
        "Thứ Bảy"
      ];

      const weekday = weekdays[now.getDay()];
      const time = now.toLocaleTimeString("vi-VN");
      const date = now.toLocaleDateString("vi-VN");

      document.getElementById("clockText").innerHTML =
      `${weekday}, ${date} • ${time}`;
    }

    setInterval(updateClock,1000);
    updateClock();

    const menuBtn = document.getElementById("menuBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");

    menuBtn.addEventListener("click", () => {
      dropdownMenu.classList.toggle("show");
    });

    window.addEventListener("click", e => {
      if(!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)){
        dropdownMenu.classList.remove("show");
      }
    });

    const hour = new Date().getHours();
    const greeting = document.getElementById("greeting");

    if(hour < 11){
      greeting.innerHTML = "☀️ Chào buổi sáng nhẹ nhàng";
    }
    else if(hour < 18){
      greeting.innerHTML = "🌤️ Chúc bạn một ngày an yên";
    }
    else{
      greeting.innerHTML = "🌙 Chúc bạn một buổi tối bình yên";
    }

    

    fetch("json/imageshome.json")
    .then(response => response.json())
    .then(images => {
      const slideTrack = document.getElementById("slideTrack");
      const duplicated = [...images, ...images];

      duplicated.forEach(src => {let quoteList = [];
let currentQuoteIndex = -1;

function showRandomQuote() {
  if (!quoteList.length) return;

  let randomIndex;

  do {
    randomIndex = Math.floor(Math.random() * quoteList.length);
  } while (randomIndex === currentQuoteIndex && quoteList.length > 1);

  currentQuoteIndex = randomIndex;

  const quoteBox = document.getElementById("quoteBox");

quoteBox.classList.add("fade-out");

setTimeout(() => {

  quoteBox.innerHTML =
    quoteList[currentQuoteIndex];

  quoteBox.classList.remove("fade-out");

}, 800);
}

fetch("json/quotes.json")
.then(response => response.json())
.then(quotes => {
  quoteList = quotes;

  showRandomQuote();

  setInterval(() => {
    showRandomQuote();
  }, 10000);
})
.catch(error => {
  console.error("Không tải được quotes.json", error);
});
        const slide = document.createElement("div");
        slide.className = "slide";
        slide.innerHTML = `<img src="${src}">`;
        slideTrack.appendChild(slide);
      });
    });

    const bgMusic = document.getElementById("bgMusic");
    const miniPlayBtn = document.getElementById("miniPlayBtn");
    const miniPrevBtn = document.getElementById("miniPrevBtn");
    const miniNextBtn = document.getElementById("miniNextBtn");
    const miniShuffleBtn = document.getElementById("miniShuffleBtn");
    const miniRepeatBtn = document.getElementById("miniRepeatBtn");

    let musicList = [];
    let currentMusicIndex = 0;
    let isMiniPlaying = false;
    let isMiniShuffle = false;
    let isMiniRepeat = false;

    bgMusic.volume = 1;

    async function loadMusicList() {
      try {
        const response = await fetch("json/music-list.json");

        if (!response.ok) {
          throw new Error("Không tải được music-list.json");
        }

        musicList = await response.json();

        if (!Array.isArray(musicList) || musicList.length === 0) {
          return;
        }

        bgMusic.src = "audio/lists/" + musicList[currentMusicIndex].file;
        bgMusic.load();
      }
      catch(error){
        console.error(error);
      }
    }

    function loadMiniSong(index) {
      if (!musicList.length) return;

      currentMusicIndex = index;
      bgMusic.src = "audio/lists/" + musicList[currentMusicIndex].file;
      bgMusic.load();
    }

    function playMiniMusic() {
      if (!musicList.length) return;

      bgMusic.play()
      .then(() => {
        isMiniPlaying = true;
        miniPlayBtn.innerHTML = "Ⅱ";
      })
      .catch(error => {
        console.log("Trình duyệt chặn phát nhạc:", error);
      });
    }

    function pauseMiniMusic() {
      bgMusic.pause();
      isMiniPlaying = false;
      miniPlayBtn.innerHTML = "▶";
    }

    function getRandomMusicIndex() {
      if (!musicList.length) return 0;
      if (musicList.length <= 1) return currentMusicIndex;

      let randomIndex;

      do {
        randomIndex = Math.floor(Math.random() * musicList.length);
      } while (randomIndex === currentMusicIndex);

      return randomIndex;
    }

    function nextMiniSong() {
      if (!musicList.length) return;

      if (isMiniShuffle) {
        currentMusicIndex = getRandomMusicIndex();
      } else {
        currentMusicIndex = (currentMusicIndex + 1) % musicList.length;
      }

      loadMiniSong(currentMusicIndex);
      playMiniMusic();
    }

    function prevMiniSong() {
      if (!musicList.length) return;

      currentMusicIndex = (currentMusicIndex - 1 + musicList.length) % musicList.length;
      loadMiniSong(currentMusicIndex);
      playMiniMusic();
    }

    miniPlayBtn.addEventListener("click", e => {
      e.stopPropagation();

      if (isMiniPlaying) {
        pauseMiniMusic();
      } else {
        playMiniMusic();
      }
    });

    miniNextBtn.addEventListener("click", e => {
      e.stopPropagation();
      nextMiniSong();
    });

    miniPrevBtn.addEventListener("click", e => {
      e.stopPropagation();
      prevMiniSong();
    });

    miniShuffleBtn.addEventListener("click", e => {
      e.stopPropagation();
      isMiniShuffle = !isMiniShuffle;
      miniShuffleBtn.classList.toggle("active-mini", isMiniShuffle);
    });

    miniRepeatBtn.addEventListener("click", e => {
      e.stopPropagation();
      isMiniRepeat = !isMiniRepeat;
      miniRepeatBtn.classList.toggle("active-mini", isMiniRepeat);
    });

    bgMusic.addEventListener("ended", () => {
      if (isMiniRepeat) {
        bgMusic.currentTime = 0;
        playMiniMusic();
      } else {
        nextMiniSong();
      }
    });

    loadMusicList();

    for(let i = 0; i < 80; i++){
      const r = document.createElement("div");
      r.className = "rain";
      r.style.left = Math.random() * 100 + "vw";
      r.style.animationDuration = (0.7 + Math.random() * 1.2) + "s";
      r.style.opacity = Math.random();
      document.body.appendChild(r);
    }

    for(let i = 0; i < 14; i++){
      const f = document.createElement("div");
      f.className = "firefly";
      f.style.left = Math.random() * 100 + "vw";
      f.style.top = Math.random() * 100 + "vh";
      f.style.animationDelay = Math.random() * 8 + "s";
      document.body.appendChild(f);
    }

    document.addEventListener("mousemove", e => {
      if(Math.random() > 0.94){
        const p = document.createElement("div");
        p.innerText = "🪷";
        p.style.position = "fixed";
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        p.style.pointerEvents = "none";
        p.style.zIndex = "999999";
        p.style.animation = "petalMove 1.2s forwards";

        document.body.appendChild(p);

        setTimeout(() => {
          p.remove();
        }, 1200);
      }
    });

    const style = document.createElement("style");

    style.innerHTML = `
      @keyframes petalMove{
        to{
          transform:translateY(-60px) rotate(80deg);
          opacity:0;
        }
      }
    `;

    document.head.appendChild(style);

    document.addEventListener("click", e => {
      const ripple = document.createElement("div");
      ripple.className = "ripple";
      ripple.style.left = e.clientX + "px";
      ripple.style.top = e.clientY + "px";

      document.body.appendChild(ripple);

      setTimeout(() => {
        ripple.remove();
      },800);
    });

  </script>

</body>
</html>
